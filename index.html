<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iansan's Training Log</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5b288c">
    <style>
        :root {
            /* Natlan Warm Palette */
            --bg-sandstone: #f4ece4;
            --panel-bg: #ffffff;
            --text-main: #2c2523;
            --text-muted: #8c7d78;
            --terracotta: #c2593b;
            --sun-orange: #e88d4f;
            --gold-accent: #d4a35c;
            
            /* Electro Accent */
            --electro-deep: #5b288c;
            --electro-bright: #9340e0;
            --electro-glow: rgba(147, 64, 224, 0.4);

            /* Category Colors */
            --cat-class: var(--sun-orange);
            --cat-study: var(--electro-deep);
            --cat-assignment: var(--terracotta);
            --cat-personal: var(--gold-accent);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-sandstone); }
        ::-webkit-scrollbar-thumb { background: var(--terracotta); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--sun-orange); }

        body {
            background-color: var(--bg-sandstone);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: row;
        }

        h1, h2, h3 {
            font-family: Impact, 'Arial Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Layout */
        .sidebar {
            width: 340px;
            background: var(--panel-bg);
            border-right: 4px solid var(--terracotta);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            overflow-y: auto;
            z-index: 10;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
        }

        /* Iansan's Corner */
        .coach-card {
            background: linear-gradient(135deg, var(--electro-deep), var(--electro-bright));
            color: white;
            padding: 20px;
            border-radius: 12px;
            border-bottom: 5px solid var(--gold-accent);
            box-shadow: 0 8px 20px var(--electro-glow);
            transition: transform 0.3s ease;
        }

        .coach-card:hover {
            transform: translateY(-2px);
        }

        .coach-card h3 {
            margin-bottom: 12px;
            font-size: 1.3rem;
            color: var(--gold-accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .coach-dialogue {
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.95;
        }

        /* Kinetic Energy Meter */
        .meter-label {
            margin-top: 15px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.8);
        }

        .meter-container {
            height: 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 5px;
            margin-top: 6px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .meter-fill {
            height: 100%;
            background: var(--gold-accent);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Today Panel */
        .today-panel {
            background: var(--bg-sandstone);
            border: 2px solid var(--terracotta);
            border-radius: 12px;
            padding: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.03);
        }

        .today-panel h2 {
            font-size: 1.2rem;
            color: var(--terracotta);
            margin-bottom: 15px;
        }

        .task-item {
            background: var(--panel-bg);
            border-left: 5px solid var(--electro-deep);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
        }

        .task-item:hover {
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }

        .task-item.completed {
            opacity: 0.5;
            text-decoration: line-through;
            border-left-color: var(--text-muted);
            background: #fdfdfd;
            box-shadow: none;
        }

        .task-info strong {
            display: block;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .task-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Checkbox Styling */
        .checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid var(--electro-deep);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .checkbox:hover {
            background: var(--electro-glow);
        }

        .completed .checkbox {
            background: var(--electro-deep);
            border-color: var(--electro-deep);
        }

        .completed .checkbox::after {
            content: '✔';
            color: white;
            font-size: 16px;
        }

        /* Forms & Buttons */
        .form-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e0d8d5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .btn {
            background: var(--terracotta);
            color: white;
            border: none;
            padding: 12px;
            font-weight: 800;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            width: 100%;
            margin-top: 10px;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover { background: var(--sun-orange); }
        .btn:active { transform: scale(0.98); }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 4px;
            margin-bottom: 15px;
            border: 2px solid #e0d8d5;
            border-radius: 6px;
            background: #faf8f6;
            transition: border-color 0.2s;
            font-size: 0.95rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--terracotta);
        }

        /* Week Grid */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .day-column {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            min-height: 350px;
            border-top: 5px solid var(--sun-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .day-header {
            text-align: center;
            border-bottom: 2px solid var(--bg-sandstone);
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: var(--terracotta);
        }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 4px solid var(--terracotta); box-shadow: none; }
            .week-grid { grid-template-columns: 1fr; }
            .container { height: auto; }
        }
    </style>
</head>
<body>

    <!-- Sidebar / Today Panel -->
    <div class="sidebar">
        <div class="coach-card">
            <h3>Iansan's Directive</h3>
            <div id="coachText" class="coach-dialogue">"You showed up. Good. Raw talent means nothing without reps. Let's see your plan."</div>
            
            <div class="meter-label">Kinetic Energy</div>
            <div class="meter-container">
                <div id="energyMeter" class="meter-fill"></div>
            </div>
        </div>

        <div class="today-panel">
            <h2>Today's Protocol</h2>
            <div id="todayList"></div>
        </div>

        <div class="form-card">
            <h2 style="font-size: 1.1rem; margin-bottom: 15px; color: var(--text-main);">Log New Drill</h2>
            <form id="taskForm">
                <input type="text" id="title" placeholder="Drill Name (e.g. Algorithms)" required>
                <select id="day">
                    <option value="0">Monday</option>
                    <option value="1">Tuesday</option>
                    <option value="2">Wednesday</option>
                    <option value="3">Thursday</option>
                    <option value="4">Friday</option>
                    <option value="5">Saturday</option>
                    <option value="6">Sunday</option>
                </select>
                <input type="time" id="startTime" required>
                <select id="category">
                    <option value="Class">Class</option>
                    <option value="Study">Study</option>
                    <option value="Assignment">Assignment</option>
                    <option value="Personal">Personal</option>
                </select>
                <button type="submit" class="btn">Commit Schedule</button>
            </form>
        </div>
    </div>

    <!-- Main Week View -->
    <div class="main-content">
        <h1 style="font-size: 2.5rem; color: var(--electro-deep); border-bottom: 3px solid var(--gold-accent); padding-bottom: 10px; display: inline-block;">Weekly Training Block</h1>
        <div class="week-grid" id="weekGrid">
            <!-- Columns generated by JS -->
        </div>
    </div>

    <script>
        // --- Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Iansan offline core engaged.', reg.scope))
                    .catch(err => console.error('Offline core failure:', err));
            });
        }

        // --- State Management ---
        let tasks = JSON.parse(localStorage.getItem('iansanTasks')) || [];

        // Realistic seed data tailored to the university schedule
        if (tasks.length === 0) {
            tasks = [
                { id: 1, title: 'Morning Loop (MBF to Campus)', day: 1, startTime: '06:00', category: 'Personal', completed: false },
                { id: 2, title: 'SCSC011 Coding Practice', day: 1, startTime: '10:00', category: 'Study', completed: false },
                { id: 3, title: 'SSTA021 Revision', day: 2, startTime: '12:00', category: 'Study', completed: false },
                { id: 4, title: 'SMTA022 Study Block', day: 3, startTime: '14:00', category: 'Class', completed: false }
            ];
            saveTasks();
        }

        // --- Iansan Voice Lines ---
        const lines = {
            greeting: [
                "You showed up. Good. Raw talent means nothing without reps.",
                "Form and focus. That's how we get through this list.",
                "Let's see the plan for today. Don't hold back."
            ],
            empty: [
                "Nothing on the board? Rest is a weapon, but don't get soft.",
                "Clear schedule. Take a breather, then we go again tomorrow."
            ],
            complete: [
                "Form check: perfect. Mark it off and move to the next.",
                "That's one down. Keep that momentum going.",
                "Good strike. Your kinetic energy is building."
            ],
            packed: [
                "Heavy load today. Keep your center of gravity low and push through.",
                "A lot on the list. Don't look at the summit, just focus on the next step."
            ]
        };

        const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        // --- Core Functions ---
        function saveTasks() {
            localStorage.setItem('iansanTasks', JSON.stringify(tasks));
        }

        function updateCoach(type) {
            const pool = lines[type] || lines.greeting;
            document.getElementById('coachText').innerText = `"${pool[Math.floor(Math.random() * pool.length)]}"`;
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderAll();
                if (task.completed) updateCoach('complete');
            }
        }

        function getColor(category) {
            switch(category) {
                case 'Class': return 'var(--cat-class)';
                case 'Study': return 'var(--cat-study)';
                case 'Assignment': return 'var(--cat-assignment)';
                default: return 'var(--cat-personal)';
            }
        }

        // --- Rendering ---
        function renderAll() {
            renderWeek();
            renderToday();
            updateKineticEnergy();
        }

        function updateKineticEnergy() {
            const todayIndex = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
            const todayTasks = tasks.filter(t => t.day === todayIndex);
            
            if (todayTasks.length === 0) {
                document.getElementById('energyMeter').style.width = '0%';
                return;
            }

            const completed = todayTasks.filter(t => t.completed).length;
            const percentage = (completed / todayTasks.length) * 100;
            document.getElementById('energyMeter').style.width = `${percentage}%`;
        }

        function createTaskHTML(task) {
            return `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-info">
                        <strong>${task.title}</strong>
                        <div class="task-meta">
                            ${task.startTime} 
                            <span style="color: #ddd;">|</span> 
                            <span class="category-badge" style="background: ${getColor(task.category)}">${task.category}</span>
                        </div>
                    </div>
                    <div class="checkbox" onclick="toggleTask(${task.id})"></div>
                </div>
            `;
        }

        function renderToday() {
            // JS getDay() returns 0 for Sunday. We map 0 to Monday for our UI logic.
            const todayIndex = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
            const todayTasks = tasks.filter(t => t.day === todayIndex).sort((a, b) => a.startTime.localeCompare(b.startTime));
            const list = document.getElementById('todayList');
            
            if (todayTasks.length === 0) {
                list.innerHTML = `<p style="color: var(--text-muted); font-style: italic;">No drills scheduled for today.</p>`;
                updateCoach('empty');
            } else {
                list.innerHTML = todayTasks.map(createTaskHTML).join('');
                if (todayTasks.length >= 4) updateCoach('packed');
            }
        }

        function renderWeek() {
            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '';
            
            daysOfWeek.forEach((dayName, index) => {
                const dayTasks = tasks.filter(t => t.day == index).sort((a, b) => a.startTime.localeCompare(b.startTime));
                
                grid.innerHTML += `
                    <div class="day-column">
                        <h3 class="day-header">${dayName}</h3>
                        ${dayTasks.length > 0 ? dayTasks.map(createTaskHTML).join('') : '<p style="color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-top: 20px;">Rest Day</p>'}
                    </div>
                `;
            });
        }

        // --- Event Listeners ---
        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newTask = {
                id: Date.now(),
                title: document.getElementById('title').value,
                day: parseInt(document.getElementById('day').value),
                startTime: document.getElementById('startTime').value,
                category: document.getElementById('category').value,
                completed: false
            };
            tasks.push(newTask);
            saveTasks();
            renderAll();
            e.target.reset();
        });

        // Initialize App
        updateCoach('greeting');
        renderAll();
    </script>
</body>
</html>
